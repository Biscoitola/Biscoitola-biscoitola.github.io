<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cha de Panela | Lista de Presentes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <button id="nav-toggle" class="hamburger-btn" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="section-drawer">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <aside id="section-drawer" class="section-drawer" aria-hidden="true">
    <div class="drawer-head">
      <p class="mb-0"><i class="fa-solid fa-list"></i> Secoes do cha</p>
      <button id="drawer-close" class="drawer-close" type="button" aria-label="Fechar menu">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <nav id="section-nav-links" class="section-nav-links" aria-label="Navegacao das secoes"></nav>
  </aside>
  <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>

  <div class="bee-sky" aria-hidden="true">
    <div class="bee" style="--x:7%; --y:14%; --s:0.82;"><span></span></div>
    <div class="bee" style="--x:18%; --y:26%; --s:1.05;"><span></span></div>
    <div class="bee" style="--x:37%; --y:20%; --s:0.9;"><span></span></div>
    <div class="bee" style="--x:56%; --y:16%; --s:1.08;"><span></span></div>
    <div class="bee" style="--x:74%; --y:24%; --s:0.96;"><span></span></div>
    <div class="bee" style="--x:90%; --y:18%; --s:0.86;"><span></span></div>
  </div>

  <main class="py-5">
    <section class="container">
      <section class="welcome-hero text-center mb-5" id="inicio">
        <p class="head-kicker mb-2"><i class="fa-solid fa-heart"></i> Bem-vindo(a)</p>
        <h1 class="mb-2">Cha de Panela</h1>
        <p class="mb-3">Escolha uma secao abaixo para ir direto aos presentes.</p>
        <div id="welcome-buttons" class="welcome-buttons"></div>
      </section>

      <div class="page-head text-center mx-auto mb-4">
        <p class="head-kicker mb-2"><i class="fa-solid fa-heart"></i> Cha de Panela</p>
        <h1 class="mb-2">Lista de Presentes</h1>
        <p class="mb-0">Escolha um item e clique em reservar. O status fica salvo no seu navegador.</p>
      </div>

      <div id="gift-sections"></div>
    </section>
  </main>

  <aside id="item-modal" class="item-modal" aria-hidden="true">
    <div class="item-modal-backdrop" data-close-modal></div>
    <div class="item-modal-panel" role="dialog" aria-modal="true" aria-labelledby="item-modal-title">
      <button class="item-modal-close" type="button" data-close-modal aria-label="Fechar">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="item-modal-media">
        <img id="item-modal-image" src="" alt="" />
      </div>
      <div class="item-modal-content">
        <p class="item-modal-kicker">Detalhes do Presente</p>
        <h2 id="item-modal-title"></h2>
        <p id="item-modal-description"></p>
        <div id="item-modal-links" class="item-modal-links"></div>
        <div id="item-modal-split" class="item-modal-split" hidden>
          <p id="item-split-caption" class="item-split-caption"></p>
          <div id="item-split-boxes" class="item-split-boxes"></div>
          <div class="item-split-controls">
            <button id="split-minus" class="split-step" type="button" aria-label="Diminuir cotas">-</button>
            <span id="split-selected" class="split-selected">0</span>
            <button id="split-plus" class="split-step" type="button" aria-label="Aumentar cotas">+</button>
            <button id="split-save" class="btn-reserve reserve" type="button">Salvar cotas</button>
            <button id="split-full" class="btn-reserve release" type="button">Comprar inteiro</button>
          </div>
        </div>
        <button id="item-modal-reserve" class="btn-reserve reserve" type="button"></button>
      </div>
    </div>
  </aside>

  <footer class="site-footer py-3">
    <div class="flower-corners" aria-hidden="true">
      <div class="flower-bed left">
        <div class="daisy" style="--x:6px; --size:42px; --h:56px; --delay:0s;"><span class="stem"></span><span class="bloom"></span></div>
        <div class="daisy" style="--x:44px; --size:34px; --h:46px; --delay:.35s;"><span class="stem"></span><span class="bloom"></span></div>
        <div class="daisy" style="--x:78px; --size:46px; --h:62px; --delay:.7s;"><span class="stem"></span><span class="bloom"></span></div>
      </div>
      <div class="flower-bed right">
        <div class="daisy" style="--x:8px; --size:42px; --h:56px; --delay:.2s;"><span class="stem"></span><span class="bloom"></span></div>
        <div class="daisy" style="--x:42px; --size:34px; --h:46px; --delay:.55s;"><span class="stem"></span><span class="bloom"></span></div>
        <div class="daisy" style="--x:76px; --size:46px; --h:62px; --delay:.9s;"><span class="stem"></span><span class="bloom"></span></div>
      </div>
    </div>
    <div class="container text-center">
      <small>Obrigado por fazer parte desse momento especial.</small>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
