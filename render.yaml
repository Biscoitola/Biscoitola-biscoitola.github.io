services:
  - type: web
    name: cha-panela-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PGSSLMODE
        value: require
      - key: ALLOWED_ORIGINS
        value: https://SEU-USUARIO.github.io
      - key: DATABASE_URL
        fromDatabase:
          name: cha-panela-db
          property: connectionString

databases:
  - name: cha-panela-db
    plan: free
    databaseName: cha_panela
    user: cha_panela_user
